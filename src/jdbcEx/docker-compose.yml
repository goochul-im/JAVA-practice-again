services:
  mysql:
    image: mysql:8.0
    container_name: mysql-jdbc-study
    ports:
      - "3500:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: jdbc_study
      MYSQL_USER: study
      MYSQL_PASSWORD: study1234
      TZ: Asia/Seoul
    volumes:
      - mysql-jdbc-study-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

volumes:
  mysql-jdbc-study-data:
